<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" role="img" aria-label="Autonomous Loop — A crash-safe background loop that picks the highest-value task with a bandit, runs it through any runner you plug in, records the outcome, and biases the next pick.">
  <defs>
    <style>
      :root { color-scheme: light dark; }
      .bg    { fill: #0A0D12; }
      .grid  { stroke: #F0A73C; stroke-opacity: .07; }
      .title { fill: #E6EDF3; font-family: ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,monospace; font-weight: 700; }
      .tag   { fill: #8B98A5; font-family: ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,monospace; }
      .accent{ fill: #F0A73C; }
      .chip  { fill: #11151d; stroke: #1e2733; }
      .chipt { fill: #8B98A5; font-family: ui-monospace,monospace; }
      @media (prefers-color-scheme: light) {
        .bg { fill: #EEF3F1; } .title { fill: #0F1720; } .tag { fill: #4d5b57; }
        .chip { fill: #ffffff; stroke: #dbe4df; } .chipt { fill: #4d5b57; } .grid { stroke-opacity: .10; }
      }
    </style>
    <pattern id="g" width="44" height="44" patternUnits="userSpaceOnUse">
      <path class="grid" d="M44 0H0V44" fill="none" stroke-width="1"/>
    </pattern>
  </defs>

  <rect class="bg" width="1200" height="340"/>
  <rect width="1200" height="340" fill="url(#g)"/>

  <!-- accent bar -->
  <rect class="accent" x="72" y="120" width="6" height="100" rx="3"/>

  <!-- eyebrow -->
  <text class="accent" x="98" y="108" font-family="ui-monospace,monospace" font-size="15" letter-spacing="6" font-weight="600">AUTONOMOUS TASK-RUNNER LOOP</text>

  <!-- title -->
  <text class="title" x="96" y="188" font-size="76">🛰️ Autonomous Loop</text>

  <!-- tagline -->
  <text class="tag" x="98" y="232" font-size="22">A crash-safe background loop that picks the highest-value task with a bandit, runs it through any runner you plug in, records the outcome, and biases the next pick.</text>

  <!-- chips -->
  <rect class="chip" x="96" y="272" width="156" height="30" rx="15"/>
  <text class="chipt" x="109" y="292" font-size="13">autonomous-agent</text>
  <rect class="chip" x="264" y="272" width="114" height="30" rx="15"/>
  <text class="chipt" x="277" y="292" font-size="13">task-runner</text>
  <rect class="chip" x="391" y="272" width="114" height="30" rx="15"/>
  <text class="chipt" x="404" y="292" font-size="13">ucb1-bandit</text>
  <rect class="chip" x="517" y="272" width="72" height="30" rx="15"/>
  <text class="chipt" x="530" y="292" font-size="13">daemon</text>
  <rect class="chip" x="602" y="272" width="106" height="30" rx="15"/>
  <text class="chipt" x="615" y="292" font-size="13">crash-safe</text>
</svg>
